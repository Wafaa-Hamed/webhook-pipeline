name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript build
        run: npm run build

      - name: Run Tests
        run: npm test

      - name: Run Lint
        run: npm run lint || echo "No lint script"

  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t webhook-app .

      - name: Run Container
        run: |
          docker run -d -p 3000:3000 --name app webhook-app

      - name: Wait for app
        run: |
          for i in {1..10}; do
            curl --fail http://localhost:3000 && exit 0
            sleep 2
          done
          exit 1

      - name: Cleanup
        run: docker rm -f app