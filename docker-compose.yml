

version: '3.9'

services:
  db:
    image: postgres:15
    container_name: webhook-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webhook_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: webhook-app
    command: npx ts-node src/index.ts
    restart: always
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/webhook_db
    ports:
      - "3000:3000"
    depends_on:
      - db

  worker:
    build: .
    container_name: webhook-worker
    command: npx ts-node src/worker.ts
    restart: always
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/webhook_db
    depends_on:
      - db

volumes:
  postgres_data: